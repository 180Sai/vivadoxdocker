#### Vivado HL WebPACK Install Configuration ####
Edition=Vivado HL WebPACK
Destination=/opt/Xilinx

# Choose the Products/Devices to install (1=install, 0=skip)
# Default: Artix-7 only
Modules=Vivado:1,Artix-7:1,Kintex-7:0,Virtex-7:0,Zynq-7000:0,UltraScale:0,UltraScale+:0,Software Development Kit (SDK):0,DocNav:0

# Install Options
InstallOptions=Acquire or Manage a License Key:0,Enable WebTalk for Vivado to send usage statistics to Xilinx:0

# Shortcuts and File Associations
CreateProgramGroupShortcuts=0
ProgramGroupFolder=Xilinx Design Tools
CreateShortcutsForAllUsers=0
CreateDesktopShortcuts=0
CreateFileAssociation=0

