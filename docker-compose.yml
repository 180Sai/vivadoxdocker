# Docker Compose Orchestration 

# ─── Environments ────────────────────────────────────────────────────────────

x-shared-env: &shared-env
  DISPLAY: ${DISPLAY:-:0}
  XAUTHORITY: /home/guest/.Xauthority
  _JAVA_AWT_WM_NONREPARENTING: 1
  QT_X11_NO_MITSHM: 1
  XLIB_SKIP_ARGB_VISUALS: 1
  AUTO_MIGRATE: ${AUTO_MIGRATE:-2}
  AUTO_RESTORE: ${AUTO_RESTORE:-1}
  WORKSPACE_MAX_MB: ${WORKSPACE_MAX_MB:-1024}
  ENABLE_CRASH_RECOVERY: ${ENABLE_CRASH_RECOVERY:-1}

x-vivado-env: &vivado-env
  <<: *shared-env

x-ise-env: &ise-env
  <<: *shared-env
  XILINXD_LICENSE_FILE: /home/guest/.Xilinx/Xilinx.lic
  MALLOC_CHECK_: 0
  LC_ALL: C
  ISE_SIM_MT: off
  BROWSER: echo

# ─── Builds ──────────────────────────────────────────────────────────────────

x-vivado-build: &vivado-build
  context: ./dvivado
  dockerfile: Dockerfile
  args:
    - VIVADO_VERSION=${VIVADO_VERSION}
  additional_contexts:
    - installer_dir=${VIVADO_INSTALLER_DIR}
    - config_dir=${VIVADO_CONFIG_DIR}

x-ise-build: &ise-build
  context: ./dise
  dockerfile: Dockerfile
  args:
    - ISE_VERSION=${ISE_VERSION}
  additional_contexts:
    - installer_dir=${ISE_INSTALLER_DIR}
    - config_dir=${ISE_CONFIG_DIR}

x-vivado-runtime: &vivado-runtime
  image: vivado:${VIVADO_VERSION}

x-ise-runtime: &ise-runtime
  image: ise:${ISE_VERSION}

# ─── Commands ─────────────────────────────────────────────────────────

# Desktop setup + wait for web services
x-cmd-idle: &cmd-idle >
  /bin/bash -c "while [ ! -w /tmp/shared-desktop ]; do sleep 1; done;
  trap 'rm -f /tmp/shared-desktop/$$APP_LABEL.desktop' EXIT &&
  cp /tmp/$$APP_ID.desktop /tmp/shared-desktop/$$APP_LABEL.desktop &&
  chmod +x /tmp/shared-desktop/$$APP_LABEL.desktop &&
  echo \"[webapp] $$APP_LABEL active on http://localhost:6080.\" && tail -f /dev/null"

# Session log attachment
x-cmd-session: &cmd-session >
  xterm -T \"$$APP_LABEL Session Log\" -bg black -fg white -fa 'Monospace' -fs 10 -geometry 120x30 -e
  /usr/local/bin/launch.sh

# ─── Services ────────────────────────────────────────────────────────────────

services:

# ─── Tool Bases ─────────────────────────────────────────────────────────────

  vivado-base:
    image: vivado:${VIVADO_VERSION}
    build: *vivado-build
    environment:
      <<: *vivado-env
      APP_LABEL: Vivado
      APP_ID: vivado
    volumes:
      - ${XAUTHORITY:-${HOME}/.Xauthority}:/home/guest/.Xauthority
      - workspace-local:/home/guest/workspace-vivado
      - ${WORKSPACE}:/mnt/host-workspace-vivado
      - ./scripts/migrate.sh:/usr/local/bin/migrate.sh:ro
      - ./scripts/launch.sh:/usr/local/bin/launch.sh:ro

  ise-base:
    image: ise:${ISE_VERSION}
    build: *ise-build
    environment:
      <<: *ise-env
      APP_LABEL: ISE
      APP_ID: ise
    volumes:
      - ${XAUTHORITY:-${HOME}/.Xauthority}:/home/guest/.Xauthority
      - workspace-local:/home/guest/workspace-ise
      - ${WORKSPACE}:/mnt/host-workspace-ise
      - ./scripts/migrate.sh:/usr/local/bin/migrate.sh:ro
      - ./scripts/launch.sh:/usr/local/bin/launch.sh:ro
      - ${ISE_LICENSE_FILE}:/home/guest/.Xilinx/Xilinx.lic:ro

# ─── Runtime Services ─────────────────────────────────────────────────────────

  web-display:
    container_name: novnc-display
    build:
      context: ./novnc-display
      dockerfile: Dockerfile.novnc
    image: web-display:latest
    ports:
      - "6080:6080"
    shm_size: '512mb'
    ipc: shareable
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - shared-desktop:/tmp/shared-desktop
      - x11-socket:/tmp/.X11-unix
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6080"]
      interval: 10s
      timeout: 5s
      retries: 3

  vivado-web:
    extends: vivado-base
    container_name: dvivado-web
    pid: "service:web-display"
    ipc: "service:web-display"
    shm_size: '512mb'
    environment:
      DISPLAY: ":0"
    volumes:
      - x11-socket:/tmp/.X11-unix
      - ./dvivado/vivado.desktop:/tmp/vivado.desktop:ro
      - shared-desktop:/tmp/shared-desktop
    depends_on:
      - web-display
    command: *cmd-idle

  vivado-linux:
    extends: vivado-base
    container_name: dvivado-linux
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    stdin_open: true
    tty: true
    command: *cmd-session

  ise-web:
    extends: ise-base
    container_name: dise-web
    pid: "service:web-display"
    ipc: "service:web-display"
    shm_size: '512mb'
    environment:
      DISPLAY: ":0"
    volumes:
      - x11-socket:/tmp/.X11-unix
      - ./dise/ise.desktop:/tmp/ise.desktop:ro
      - shared-desktop:/tmp/shared-desktop
    depends_on:
      - web-display
    command: *cmd-idle

  ise-linux:
    extends: ise-base
    container_name: dise-linux
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    stdin_open: true
    tty: true
    command: *cmd-session

volumes:
  workspace-local: {}
  x11-socket: {}
  shared-desktop: {}
